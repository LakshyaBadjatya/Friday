<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>FRIDAY · Maps</title>

  <!--
    No-build, no-bundler frontend. Fully KEYLESS / no paid API: the map is
    MapLibre GL rendering OpenStreetMap tiles (loaded from a CDN below), and
    search / geocoding / routing are proxied from FRIDAY's own backend
    (`/maps/geocode`, `/maps/route`, `/maps/weather`) which uses the free
    Nominatim + OSRM + wttr.in services. The page checks `/maps/config` only to
    learn whether the surface is enabled; if not, it shows a friendly notice.

    The map is an interactive OpenStreetMap globe (MapLibre globe projection). It
    idle-rotates, supports "fly to <place>", "distance to <place>", place search,
    routes, weather and multi-stop tours via the in-page Web Speech mic and the
    `?fly=` / `?to=` / `?cmd=` query params.
  -->
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.css" />

  <style>
    /* FRIDAY-OS visual language — same tokens / holo-frame / scanline system as
       the HUD cockpit, ported inline so /maps matches without a shared mount.
       The accent follows whichever theme was chosen in the HUD (applied to
       <html data-theme> by the inline script below). The map itself stays the
       star; the chrome reads as a translucent tactical overlay on the world. */
    :root {
      color-scheme: dark;
      --bg: #03060d;
      --surface: rgba(8, 12, 20, 0.82);
      --surface-2: rgba(10, 15, 25, 0.88);
      --ink: #d9ebff;
      --ink-dim: #6f86a0;
      --accent: #4fe3ff;
      --accent-rgb: 79, 227, 255;
      --ok: #5fe6a6;
      --warn: #ffce73;
      --danger: #ff6b78;
      --line: rgba(var(--accent-rgb), 0.2);
      --mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, Menlo, Consolas, monospace;
      --glow-text: 0 0 10px rgba(var(--accent-rgb), 0.55);
      --glow-box: 0 0 18px rgba(var(--accent-rgb), 0.18), 0 10px 34px rgba(0, 0, 0, 0.5);
      --scan: rgba(var(--accent-rgb), 0.05);
    }
    /* accent themes mirror the HUD; the map chrome stays dark in every theme */
    [data-theme="amber"]   { --accent: #ffb347; --accent-rgb: 255, 179, 71; }
    [data-theme="crimson"] { --accent: #ff3b52; --accent-rgb: 255, 59, 82; }
    [data-theme="emerald"] { --accent: #43f0a0; --accent-rgb: 67, 240, 160; }
    [data-theme="light"]   { --accent: #0a84c7; --accent-rgb: 10, 132, 199; }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--mono);
      background:
        radial-gradient(1100px 760px at 12% -10%, rgba(var(--accent-rgb), 0.1) 0%, transparent 58%),
        var(--bg);
      color: var(--ink);
      overflow: hidden;
      letter-spacing: 0.02em;
      -webkit-font-smoothing: antialiased;
    }
    /* CRT scanline + vignette glass over the whole world (never blocks clicks) */
    body::after {
      content: "";
      position: fixed; inset: 0; z-index: 9999; pointer-events: none;
      background: repeating-linear-gradient(180deg, var(--scan) 0 1px, transparent 1px 3px);
      box-shadow: inset 0 0 220px 36px rgba(0, 0, 0, 0.6);
      opacity: 0.5;
    }
    #app { position: fixed; inset: 0; display: flex; flex-direction: column; }

    /* --- top + bottom command bars ---------------------------------------- */
    #topbar, #controls {
      position: relative;
      display: flex; align-items: center; gap: 0.7rem;
      padding: 0.6rem 1rem;
      background: linear-gradient(180deg, rgba(8, 12, 20, 0.92), rgba(6, 10, 18, 0.92));
      backdrop-filter: blur(8px);
      z-index: 5;
    }
    #topbar { border-bottom: 1px solid var(--line); }
    #controls { border-top: 1px solid var(--line); }
    /* glowing instrument hairline on each bar's inner edge */
    #topbar::after, #controls::after {
      content: ""; position: absolute; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.55; box-shadow: var(--glow-text); pointer-events: none;
    }
    #topbar::after { bottom: -1px; }
    #controls::after { top: -1px; }
    .brand-mark {
      font-weight: 700; letter-spacing: 0.34em; color: var(--ink);
      text-shadow: 0 0 16px rgba(var(--accent-rgb), 0.25);
    }
    .brand-sub {
      color: var(--accent); font-size: 0.7rem; margin-left: 0.5rem;
      text-transform: uppercase; letter-spacing: 0.24em;
    }
    .pill {
      margin-left: auto; display: inline-flex; align-items: center; gap: 0.45rem;
      font-size: 0.68rem; padding: 0.28rem 0.7rem; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.14em; color: var(--ink-dim);
      border: 1px solid var(--line); background: rgba(var(--accent-rgb), 0.04);
    }
    .dot { width: 0.5rem; height: 0.5rem; border-radius: 50%; background: var(--warn); box-shadow: 0 0 8px currentColor; }
    .pill.ok { color: var(--ok); } .pill.ok .dot { background: var(--ok); }
    .pill.err { color: var(--danger); } .pill.err .dot { background: var(--danger); }

    #stage { position: relative; flex: 1; }
    #map { position: absolute; inset: 0; width: 100%; height: 100%; }
    #fallback {
      position: absolute; inset: 0; display: none;
      align-items: center; justify-content: center; text-align: center;
      padding: 2rem; color: var(--ink-dim);
    }

    /* --- floating glass instruments (holo-frame with corner brackets) ----- */
    #hud, #panel, #toast {
      position: absolute;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 0.55rem;
      backdrop-filter: blur(8px);
      box-shadow: var(--glow-box);
    }
    #hud::before, #panel::before, #toast::before {
      content: ""; position: absolute; inset: -1px; border-radius: inherit; pointer-events: none;
      --bl: 11px; --bw: 1.5px;
      background:
        linear-gradient(var(--accent), var(--accent)) 0 0 / var(--bl) var(--bw) no-repeat,
        linear-gradient(var(--accent), var(--accent)) 0 0 / var(--bw) var(--bl) no-repeat,
        linear-gradient(var(--accent), var(--accent)) 100% 0 / var(--bl) var(--bw) no-repeat,
        linear-gradient(var(--accent), var(--accent)) 100% 0 / var(--bw) var(--bl) no-repeat,
        linear-gradient(var(--accent), var(--accent)) 0 100% / var(--bl) var(--bw) no-repeat,
        linear-gradient(var(--accent), var(--accent)) 0 100% / var(--bw) var(--bl) no-repeat,
        linear-gradient(var(--accent), var(--accent)) 100% 100% / var(--bl) var(--bw) no-repeat,
        linear-gradient(var(--accent), var(--accent)) 100% 100% / var(--bw) var(--bl) no-repeat;
      opacity: 0.6;
    }
    #hud {
      top: 0.75rem; left: 0.75rem; padding: 0.6rem 0.75rem;
      font-size: 0.72rem; line-height: 1.7; pointer-events: none; max-width: 18rem;
    }
    .hud-row { display: flex; gap: 0.5rem; }
    .hud-key { color: var(--ink-dim); width: 4.5rem; text-transform: uppercase; letter-spacing: 0.1em; }

    #controls input {
      flex: 1; padding: 0.55rem 0.7rem; border-radius: 0.45rem;
      border: 1px solid var(--line);
      background: rgba(3, 6, 13, 0.7); color: var(--ink);
      font-family: var(--mono); font-size: 0.9rem;
    }
    #controls input::placeholder { color: var(--ink-dim); }
    #controls input:focus { outline: none; border-color: rgba(var(--accent-rgb), 0.55); box-shadow: 0 0 0 1px rgba(var(--accent-rgb), 0.2); }

    .btn {
      padding: 0.5rem 0.85rem; border-radius: 0.45rem; cursor: pointer;
      border: 1px solid var(--line);
      background: rgba(var(--accent-rgb), 0.05); color: var(--ink);
      font-family: var(--mono); font-size: 0.78rem;
      letter-spacing: 0.08em; text-transform: uppercase;
      transition: border-color 150ms ease, box-shadow 150ms ease, background 150ms ease;
    }
    .btn:hover { border-color: rgba(var(--accent-rgb), 0.55); box-shadow: 0 0 14px rgba(var(--accent-rgb), 0.18); }
    .btn-primary { background: rgba(var(--accent-rgb), 0.16); border-color: rgba(var(--accent-rgb), 0.55); color: var(--accent); text-shadow: var(--glow-text); }
    .btn[aria-pressed="true"] { background: rgba(95, 230, 166, 0.16); border-color: var(--ok); color: var(--ok); }

    #toast {
      bottom: 1rem; left: 50%; transform: translateX(-50%);
      padding: 0.6rem 0.9rem; font-size: 0.8rem; max-width: 80%; z-index: 6;
    }
    #toast[hidden] { display: none; }

    #cam-controls {
      position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 0.35rem; z-index: 5;
    }
    #cam-controls .btn { padding: 0.4rem 0.55rem; min-width: 2.4rem; text-align: center; font-size: 0.85rem; }

    #panel {
      top: 0.75rem; right: 0.75rem; width: 16rem;
      padding: 0.85rem 0.95rem; font-size: 0.8rem; z-index: 6;
    }
    #panel[hidden] { display: none; }
    #panel h2 {
      margin: 0 0 0.55rem; font-size: 0.72rem; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.18em; text-shadow: var(--glow-text);
    }
    .panel-row { display: flex; justify-content: space-between; gap: 0.75rem; padding: 0.18rem 0; }
    .panel-row span { color: var(--ink-dim); }
    .panel-close {
      position: absolute; top: 0.35rem; right: 0.5rem; background: none; border: none;
      color: var(--ink-dim); font-size: 1.15rem; line-height: 1; cursor: pointer;
    }
    .panel-close:hover { color: var(--accent); }

    #saved {
      position: absolute; left: 0.75rem; bottom: 0.75rem; display: flex; gap: 0.4rem;
      flex-wrap: wrap; max-width: 60%; z-index: 5;
    }
    #saved[hidden] { display: none; }
    .chip {
      padding: 0.3rem 0.65rem; border-radius: 999px; cursor: pointer; font-size: 0.72rem;
      letter-spacing: 0.06em; font-family: var(--mono);
      border: 1px solid var(--line); background: var(--surface); color: var(--ink);
      backdrop-filter: blur(6px);
    }
    .chip:hover { border-color: rgba(var(--accent-rgb), 0.55); color: var(--accent); }

    @media (prefers-reduced-motion: reduce) { body::after { background: none; } }
  </style>
</head>
<body>
  <div id="app">
    <header id="topbar">
      <span class="brand-mark">FRIDAY</span><span class="brand-sub">Maps</span>
      <span id="conn-status" class="pill" title="Maps connection">
        <span class="dot"></span><span class="conn-label">connecting…</span>
      </span>
    </header>

    <main id="stage">
      <!-- MapLibre GL renders into this container at runtime (no key needed). -->
      <div id="map"></div>

      <div id="fallback">
        <div>
          <p id="fallback-msg">Maps is unavailable.</p>
          <p style="opacity:0.6">Set <code>FRIDAY_ENABLE_MAPS=true</code> to enable the map (no API key needed).</p>
        </div>
      </div>

      <div id="hud" aria-live="polite">
        <div class="hud-row"><span class="hud-key">mode</span><span id="hud-mode">idle rotate</span></div>
        <div class="hud-row"><span class="hud-key">voice</span><span id="hud-voice">off</span></div>
        <div class="hud-row"><span class="hud-key">heard</span><span id="hud-heard">—</span></div>
        <div class="hud-row"><span class="hud-key">status</span><span id="hud-status">ready</span></div>
      </div>

      <div id="cam-controls" role="group" aria-label="Camera controls">
        <button id="home" type="button" class="btn" title="Home / reset view">🌍</button>
        <button id="zoom-in" type="button" class="btn" title="Zoom in">＋</button>
        <button id="zoom-out" type="button" class="btn" title="Zoom out">－</button>
        <button id="tilt-up" type="button" class="btn" title="Tilt up">▲</button>
        <button id="tilt-down" type="button" class="btn" title="Tilt down">▼</button>
      </div>

      <aside id="panel" aria-live="polite" hidden></aside>

      <div id="saved" aria-label="Saved places" hidden></div>

      <div id="toast" role="status" hidden></div>
    </main>

    <footer id="controls">
      <form id="cmd-form" autocomplete="off" style="display:flex; flex:1; gap:0.5rem;">
        <input
          id="cmd"
          name="cmd"
          type="text"
          placeholder='Try "find coffee in Paris", "route from London to Rome", "weather in Cairo", "tour Paris, Rome, Cairo"'
          aria-label="Map command" />
        <button id="run" type="submit" class="btn btn-primary">Go</button>
        <button id="mic" type="button" class="btn" aria-pressed="false" title="Toggle voice">🎤 Voice</button>
        <button id="rotate" type="button" class="btn" aria-pressed="true" title="Idle rotation">Rotate</button>
        <button id="save" type="button" class="btn" title="Save the current place">★ Save</button>
      </form>
    </footer>
  </div>

  <!-- Mirror the accent chosen in the HUD cockpit (persisted by hud.js as the
       "friday-theme" key) so every FRIDAY surface re-skins together. -->
  <script>
    try {
      var t = window.localStorage.getItem("friday-theme");
      if (t && t !== "default") document.documentElement.setAttribute("data-theme", t);
    } catch (e) { /* private mode — default accent applies */ }
  </script>

  <!-- MapLibre GL (keyless) — loaded before the module so window.maplibregl exists. -->
  <script src="https://unpkg.com/maplibre-gl@5/dist/maplibre-gl.js"></script>
  <script type="module" src="/maps/static/maps.js"></script>
</body>
</html>
