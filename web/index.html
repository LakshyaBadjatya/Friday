<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Sign in</title>
  <style>
    :root { color-scheme: dark light; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 26rem; margin: 4rem auto; padding: 0 1rem; line-height: 1.5;
    }
    h1 { font-size: 1.4rem; }
    input, button { font: inherit; padding: 0.55rem 0.7rem; border-radius: 0.5rem; }
    input { width: 100%; box-sizing: border-box; margin: 0.3rem 0; border: 1px solid #8884; }
    button { cursor: pointer; border: 1px solid #8884; background: #4f46e5; color: #fff; }
    button.ghost { background: transparent; color: inherit; }
    .row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .row button { flex: 1; }
    .ok { color: #16a34a; } .err { color: #dc2626; }
    #status { min-height: 1.4rem; margin-top: 0.8rem; }
    hr { border: none; border-top: 1px solid #8883; margin: 1.2rem 0; }
    #links { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1.6rem; }
    #links a {
      font-size: 0.9rem; text-decoration: none; color: inherit;
      padding: 0.45rem 0.8rem; border: 1px solid #8884; border-radius: 0.5rem;
    }
    #links a.dl { background: #4f46e5; color: #fff; border-color: #4f46e5; }
    #links a.big { flex-basis: 100%; text-align: center; font-weight: 600; background: #16a34a; color: #fff; border-color: #16a34a; padding: 0.6rem; }
    .muted { color: #8888; font-size: 0.9rem; }
    hr.sep { margin: 1.6rem 0; }
    #circle h2 { font-size: 1.15rem; margin-bottom: 0.4rem; }
    #circle h3 { font-size: 1rem; margin: 1rem 0 0.4rem; }
    #groups-list { display: flex; gap: 0.4rem; flex-wrap: wrap; margin: 0.6rem 0; }
    .group-pill { padding: 0.4rem 0.7rem; }
    #members { display: flex; flex-direction: column; gap: 0.35rem; margin: 0.4rem 0; }
    .member-pill { font-size: 0.85rem; padding: 0.25rem 0.6rem; border: 1px solid #8884; border-radius: 1rem; }
    .member-row { display: flex; align-items: baseline; gap: 0.6rem; flex-wrap: wrap; font-size: 0.9rem; }
    .member-name { font-weight: 600; }
    .member-meta { color: #8889; font-size: 0.82rem; }
    .member-map { font-size: 0.8rem; text-decoration: none; }
    #invite-out textarea { width: 100%; box-sizing: border-box; font-size: 0.8rem; }
    .messages { border: 1px solid #8884; border-radius: 0.6rem; padding: 0.6rem; height: 16rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.4rem; margin: 0.6rem 0; }
    .msg { display: flex; }
    .msg.mine { justify-content: flex-end; }
    .bubble { max-width: 75%; padding: 0.4rem 0.7rem; border-radius: 0.8rem; background: #8882; word-break: break-word; }
    .msg.mine .bubble { background: #4f46e5; color: #fff; }
    #circle-status { min-height: 1.2rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Sign in</h1>

  <section id="signed-out">
    <input id="email" type="email" placeholder="email" autocomplete="email" />
    <input id="password" type="password" placeholder="password" autocomplete="current-password" />
    <div class="row">
      <button id="login">Sign in</button>
      <button id="register" class="ghost">Create account</button>
    </div>
    <div class="row">
      <button id="google" class="ghost">Continue with Google</button>
    </div>
  </section>

  <section id="signed-in" hidden>
    <p>Signed in as <strong id="who"></strong>.</p>
    <p id="profile"></p>
    <nav id="links" aria-label="Menu">
      <a class="big" href="https://friday-backend-oj8h.onrender.com/hud" target="_blank" rel="noopener">Open HUD</a>
      <a href="https://friday-backend-oj8h.onrender.com/maps" target="_blank" rel="noopener">Maps</a>
      <a href="https://friday-backend-oj8h.onrender.com/studio" target="_blank" rel="noopener">Studio</a>
      <a class="dl" href="./friday.shortcut" download="friday.shortcut">Download Siri Shortcut</a>
    </nav>
    <div class="row">
      <button id="siri-token" class="ghost">Copy my Siri token</button>
    </div>

    <hr class="sep" />
    <section id="circle">
      <h2>Your circle</h2>
      <div class="row">
        <input id="group-name" placeholder="Group name (e.g. Us)" autocomplete="off" />
        <button id="create-group">Create group</button>
      </div>
      <div id="groups-list"></div>

      <div id="group-panel" hidden>
        <h3 id="group-title"></h3>
        <div id="members"></div>
        <div class="row">
          <button id="invite-friend" class="ghost">Invite friend</button>
          <button id="cast-hud" class="ghost">Open chat in HUD</button>
        </div>
        <div id="invite-out" hidden>
          <p class="muted">Send this private link to your friend. The encryption key lives in the link and never reaches our server.</p>
          <textarea id="invite-link" readonly rows="3"></textarea>
          <button id="copy-invite" class="ghost">Copy link</button>
        </div>

        <h3>Chat <span class="muted">· end-to-end encrypted</span></h3>
        <div id="messages" class="messages" aria-live="polite"></div>
        <div class="row">
          <input id="chat-input" placeholder="Message…" autocomplete="off" />
          <button id="chat-send">Send</button>
        </div>
      </div>
      <div id="circle-status" aria-live="polite"></div>
    </section>

    <hr class="sep" />
    <button id="logout" class="ghost">Sign out</button>
  </section>

  <div id="status" aria-live="polite"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
