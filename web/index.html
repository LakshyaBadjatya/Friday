<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>Sign in</title>
  <style>
    :root { color-scheme: dark light; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 26rem; margin: 4rem auto; padding: 0 1rem; line-height: 1.5;
    }
    h1 { font-size: 1.4rem; }
    input, button { font: inherit; padding: 0.55rem 0.7rem; border-radius: 0.5rem; }
    input { width: 100%; box-sizing: border-box; margin: 0.3rem 0; border: 1px solid #8884; }
    button { cursor: pointer; border: 1px solid #8884; background: #4f46e5; color: #fff; }
    button.ghost { background: transparent; color: inherit; }
    .row { display: flex; gap: 0.5rem; margin-top: 0.5rem; }
    .row button { flex: 1; }
    .ok { color: #16a34a; } .err { color: #dc2626; }
    #status { min-height: 1.4rem; margin-top: 0.8rem; }
    hr { border: none; border-top: 1px solid #8883; margin: 1.2rem 0; }
    #links { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1.6rem; }
    #links a {
      font-size: 0.9rem; text-decoration: none; color: inherit;
      padding: 0.45rem 0.8rem; border: 1px solid #8884; border-radius: 0.5rem;
    }
    #links a.dl { background: #4f46e5; color: #fff; border-color: #4f46e5; }
  </style>
</head>
<body>
  <h1>Sign in</h1>

  <section id="signed-out">
    <input id="email" type="email" placeholder="email" autocomplete="email" />
    <input id="password" type="password" placeholder="password" autocomplete="current-password" />
    <div class="row">
      <button id="login">Sign in</button>
      <button id="register" class="ghost">Create account</button>
    </div>
    <div class="row">
      <button id="google" class="ghost">Continue with Google</button>
    </div>
  </section>

  <section id="signed-in" hidden>
    <p>Signed in as <strong id="who"></strong>.</p>
    <p id="profile"></p>
    <button id="logout" class="ghost">Sign out</button>
  </section>

  <div id="status" aria-live="polite"></div>

  <nav id="links" aria-label="Friday">
    <a href="http://localhost:8800/hud">HUD</a>
    <a href="http://localhost:8800/maps">Maps</a>
    <a href="http://localhost:8800/studio">Studio</a>
    <a class="dl" href="./friday.shortcut" download="friday.shortcut">Download Siri Shortcut</a>
  </nav>

  <script type="module" src="./app.js"></script>
</body>
</html>
